<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Export — NateSystem</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; gap: 40px; }
  canvas { border: 1px solid #333; cursor: pointer; }
  .label { color: #666; font-size: 13px; margin-bottom: -28px; letter-spacing: 1px; }
  button { padding: 12px 36px; background: #E63946; color: #fff; border: none; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px; border-radius: 8px; }
  button:hover { background: #ff4d5a; }
  .row { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .grid { display: flex; gap: 48px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>

<div class="grid">
  <!-- Square icon logo -->
  <div class="row">
    <span class="label">ICON — 512×512</span>
    <canvas id="icon" width="512" height="512"></canvas>
    <button onclick="dl('icon','natesystem-logo-icon.png')">Download Icon</button>
  </div>

  <!-- Square icon logo (small) -->
  <div class="row">
    <span class="label">ICON — 200×200</span>
    <canvas id="iconSmall" width="200" height="200"></canvas>
    <button onclick="dl('iconSmall','natesystem-logo-icon-200.png')">Download Small</button>
  </div>

  <!-- Full logo with text -->
  <div class="row">
    <span class="label">FULL LOGO — 800×200</span>
    <canvas id="full" width="800" height="200"></canvas>
    <button onclick="dl('full','natesystem-logo-full.png')">Download Full</button>
  </div>
</div>

<script>
document.fonts.ready.then(() => {

  // ========== ICON 512x512 ==========
  function drawIcon(canvas) {
    const s = canvas.width;
    const ctx = canvas.getContext('2d');

    // Dark background with rounded corners
    ctx.fillStyle = '#0e0e12';
    const r = s * 0.12;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(s - r, 0);
    ctx.quadraticCurveTo(s, 0, s, r);
    ctx.lineTo(s, s - r);
    ctx.quadraticCurveTo(s, s, s - r, s);
    ctx.lineTo(r, s);
    ctx.quadraticCurveTo(0, s, 0, s - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    const gridSize = s / 8;
    for (let i = gridSize; i < s; i += gridSize) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(s, i); ctx.stroke();
    }

    // White transparent frame (like the landing page cards)
    const pad = s * 0.10;
    const fw = s - pad * 2;
    const fh = s - pad * 2;
    const fr = s * 0.05;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad + fr, pad);
    ctx.lineTo(pad + fw - fr, pad);
    ctx.quadraticCurveTo(pad + fw, pad, pad + fw, pad + fr);
    ctx.lineTo(pad + fw, pad + fh - fr);
    ctx.quadraticCurveTo(pad + fw, pad + fh, pad + fw - fr, pad + fh);
    ctx.lineTo(pad + fr, pad + fh);
    ctx.quadraticCurveTo(pad, pad + fh, pad, pad + fh - fr);
    ctx.lineTo(pad, pad + fr);
    ctx.quadraticCurveTo(pad, pad, pad + fr, pad);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // "N" character — bigger, zoomed in
    const fontSize = s * 0.72;
    ctx.fillStyle = '#f0f0f2';
    ctx.font = 'italic ' + fontSize + 'px "Instrument Serif"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', s * 0.43, s * 0.48);

    // Red dot — bigger
    const dotR = s * 0.055;
    ctx.fillStyle = '#E63946';
    ctx.beginPath();
    ctx.arc(s * 0.74, s * 0.70, dotR, 0, Math.PI * 2);
    ctx.fill();

    // Dot glow
    ctx.shadowColor = 'rgba(230, 57, 70, 0.4)';
    ctx.shadowBlur = dotR * 2.5;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawIcon(document.getElementById('icon'));
  drawIcon(document.getElementById('iconSmall'));

  // ========== FULL LOGO 800x200 ==========
  const fc = document.getElementById('full');
  const fctx = fc.getContext('2d');

  // Dark background
  fctx.fillStyle = '#0e0e12';
  fctx.fillRect(0, 0, 800, 200);

  // Subtle grid
  fctx.strokeStyle = 'rgba(255,255,255,0.04)';
  fctx.lineWidth = 1;
  for (let i = 40; i < 800; i += 40) {
    fctx.beginPath(); fctx.moveTo(i, 0); fctx.lineTo(i, 200); fctx.stroke();
  }
  for (let i = 40; i < 200; i += 40) {
    fctx.beginPath(); fctx.moveTo(0, i); fctx.lineTo(800, i); fctx.stroke();
  }

  // "N" on the left
  fctx.fillStyle = '#f0f0f2';
  fctx.font = 'italic 110px "Instrument Serif"';
  fctx.textAlign = 'left';
  fctx.textBaseline = 'middle';
  fctx.fillText('N', 60, 100);

  // Red dot after N
  fctx.fillStyle = '#E63946';
  fctx.beginPath();
  fctx.arc(148, 132, 6, 0, Math.PI * 2);
  fctx.fill();
  fctx.shadowColor = 'rgba(230, 57, 70, 0.4)';
  fctx.shadowBlur = 10;
  fctx.fill();
  fctx.shadowBlur = 0;

  // "NateSystem" text
  fctx.fillStyle = '#f0f0f2';
  fctx.font = 'italic 42px "Instrument Serif"';
  fctx.textAlign = 'left';
  fctx.textBaseline = 'middle';
  fctx.fillText('NateSystem', 190, 95);

  // Subtitle
  fctx.fillStyle = 'rgba(255,255,255,0.25)';
  fctx.font = '300 13px "Instrument Serif"';
  fctx.fillText('Intelligent systems for growing businesses', 192, 125);
});

function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
